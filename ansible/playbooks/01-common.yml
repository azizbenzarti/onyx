---
- name: Prepare all nodes
  hosts: all
  become: yes

  tasks:
    - name: Update apt package index
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install common packages
      apt:
        name:
          - vim
          - curl
          - wget
          - git
          - net-tools
          - htop
          - ca-certificates
          - software-properties-common
          - gnupg
          - apt-transport-https
          - lsb-release
        state: present

    - name: Disable swap immediately
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Disable swap permanently in fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Load br_netfilter module
      modprobe:
        name: br_netfilter
        state: present

    - name: Load overlay module
      modprobe:
        name: overlay
        state: present

    - name: Persist Kubernetes kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          br_netfilter
          overlay
        owner: root
        group: root
        mode: '0644'

    - name: Configure Kubernetes sysctl settings
      copy:
        dest: /etc/sysctl.d/99-kubernetes.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1
        owner: root
        group: root
        mode: '0644'

    - name: Apply sysctl settings
      command: sysctl --system

    - name: Set hostname from inventory name
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Ensure /etc/hosts contains cluster nodes
      blockinfile:
        path: /etc/hosts
        marker: "# {mark} ONYX K3S NODES"
        block: |
          192.168.56.10 onyx-master
          192.168.56.11 onyx-worker-app
          192.168.56.12 onyx-worker-ai

    - name: Check node preparation
      command: hostname
      register: hostname_output

    - name: Show prepared hostname
      debug:
        msg: "Prepared node: {{ hostname_output.stdout }}"